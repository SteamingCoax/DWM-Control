name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (for manual runs), e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

jobs:
  publish-mac:
    name: Publish macOS
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Import signing certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "${MAC_CERT_P12:-}" ] || [ -z "${MAC_CERT_PASSWORD:-}" ]; then
            echo "MAC_CERT_P12 or MAC_CERT_PASSWORD secret is missing" >&2
            exit 1
          fi

          CERT_PATH="${RUNNER_TEMP}/mac-signing-cert.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Clean up any leftover keychain from a previous failed run
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

          echo "$MAC_CERT_P12" | base64 --decode > "$CERT_PATH"
          if [ ! -s "$CERT_PATH" ]; then
            echo "Decoded MAC_CERT_P12 is empty or invalid base64" >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import private key + cert; -A = no ACL restrictions on the private key
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" -A -f pkcs12

          # Grant codesign non-interactive access to the private key (required on macOS 12+)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download Apple CA certs needed to build the trust chain.
          echo "--- Downloading Apple CA certs ---"
          curl -sSfL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" \
            -o "${RUNNER_TEMP}/DeveloperIDG2CA.cer"
          curl -sSfL "https://www.apple.com/certificateauthority/AppleRootCA-G2.cer" \
            -o "${RUNNER_TEMP}/AppleRootCAG2.cer"
          echo "  DeveloperIDG2CA: $(wc -c < "${RUNNER_TEMP}/DeveloperIDG2CA.cer") bytes"
          echo "  AppleRootCAG2:   $(wc -c < "${RUNNER_TEMP}/AppleRootCAG2.cer") bytes"

          # Print fingerprints so we can verify we downloaded the right certs
          openssl x509 -inform DER -in "${RUNNER_TEMP}/DeveloperIDG2CA.cer" -noout -fingerprint -sha256 || true
          openssl x509 -inform DER -in "${RUNNER_TEMP}/AppleRootCAG2.cer"   -noout -fingerprint -sha256 || true

          # Import into the BUILD keychain (so codesign can locate them during chain walking)
          security import "${RUNNER_TEMP}/DeveloperIDG2CA.cer" -k "$KEYCHAIN_PATH" 2>/dev/null || true
          security import "${RUNNER_TEMP}/AppleRootCAG2.cer"   -k "$KEYCHAIN_PATH" 2>/dev/null || true

          # Apple Root CA G2 is already trusted in the system store on macos-15.
          # Importing it into the build keychain (above) is sufficient for chain walking.
          # Do NOT call add-trusted-cert — it hangs waiting for system authorization.

          # Prepend build keychain to the existing search list (preserves System.keychain etc.)
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | xargs)

          echo "=== Certs in build keychain after setup ==="
          security find-certificate -a "$KEYCHAIN_PATH" | grep "labl" || true

          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Verify codesign works with build keychain
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"

          echo "=== macOS version ==="
          sw_vers

          echo "=== Keychain search list ==="
          security list-keychains -d user

          echo "=== Identities in build keychain ==="
          security find-identity -v "$SIGNING_KEYCHAIN"

          echo "=== All certs in build keychain ==="
          security find-certificate -a "$SIGNING_KEYCHAIN" | grep "labl"

          echo "=== Signing cert validity dates ==="
          security find-certificate -c "Developer ID Application: COAXON Systemes Inc" \
            -p "$SIGNING_KEYCHAIN" \
            | openssl x509 -noout -subject -issuer -dates

          echo "=== User trust settings (Apple Root CA) ==="
          security dump-trust-settings 2>&1 | grep -A3 "Apple Root" || echo "(none)"

          echo "=== verify-cert for signing cert ==="
          security find-certificate -c "Developer ID Application: COAXON Systemes Inc" \
            -p "$SIGNING_KEYCHAIN" > "${RUNNER_TEMP}/leaf.pem"
          security verify-cert -c "${RUNNER_TEMP}/leaf.pem" -p codesign \
            -k "$SIGNING_KEYCHAIN" 2>&1 || true

          cp /bin/ls "${RUNNER_TEMP}/test-bin"

          echo "=== TEST 1: basic sign (no options, no timestamp) ==="
          codesign --sign "8263089E2FDBBF70732F3561BB71D82323ADCFE5" \
            --keychain "$SIGNING_KEYCHAIN" --force \
            "${RUNNER_TEMP}/test-bin" 2>&1 \
            && echo "TEST 1: PASSED" || echo "TEST 1: FAILED"

          echo "=== TEST 2: sign + --options runtime (no timestamp) ==="
          codesign --sign "8263089E2FDBBF70732F3561BB71D82323ADCFE5" \
            --keychain "$SIGNING_KEYCHAIN" --force --options runtime \
            "${RUNNER_TEMP}/test-bin" 2>&1 \
            && echo "TEST 2: PASSED" || echo "TEST 2: FAILED"

          echo "=== TEST 3: sign + --options runtime + --timestamp (what electron-builder does) ==="
          codesign --sign "8263089E2FDBBF70732F3561BB71D82323ADCFE5" \
            --keychain "$SIGNING_KEYCHAIN" --force --options runtime --timestamp \
            "${RUNNER_TEMP}/test-bin" 2>&1 \
            && echo "TEST 3: PASSED" || { echo "TEST 3: FAILED"; exit 1; }

      - name: Build macOS artifacts
        env:
          DEBUG: "electron-builder"
          CSC_KEYCHAIN: ${{ env.SIGNING_KEYCHAIN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          rm -rf "$MAC_OUT_DIR" || true
          COPYFILE_DISABLE=1 npx electron-builder --mac --publish=never --config.directories.output="$MAC_OUT_DIR"

      - name: Remove build keychain
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/build.keychain-db" 2>/dev/null || true

      - name: Verify macOS app signature
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          APP_PATH="$(find "$MAC_OUT_DIR" -type d -name "DWM Control.app" | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $MAC_OUT_DIR" >&2
            exit 1
          fi
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload macOS assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          gh release upload "$RELEASE_TAG" \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-Intel.dmg \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-AppleSilicon.zip \
            "$MAC_OUT_DIR"/latest-mac*.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-windows:
    name: Publish Windows
    runs-on: [self-hosted, Linux]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Prepare Wine runtime directory
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"

      - name: Build Windows artifacts
        env:
          WINE: wine64
          NSIS_USE_SYSTEM_NSIS: "true"
          XDG_RUNTIME_DIR: ${{ runner.temp }}/xdg-runtime
          DISPLAY: ":99"
          WINEARCH: win64
          WINEPREFIX: ${{ runner.temp }}/wine64
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          WINE_BIN="$(command -v wine64 || command -v wine || true)"
          if [ -z "$WINE_BIN" ]; then
            echo "Neither wine64 nor wine is installed on this runner" >&2
            exit 127
          fi
          ln -sf "$WINE_BIN" "$RUNNER_TEMP/bin/wine"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          Xvfb :99 -screen 0 1024x768x16 >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          trap 'kill "$XVFB_PID" >/dev/null 2>&1 || true' EXIT
          wine --version
          wineboot -u
          npm run build:win

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Windows assets to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Windows-Setup.exe \
            dist/latest.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-linux:
    name: Publish Linux
    runs-on: [self-hosted, Linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Linux assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Linux.AppImage \
            dist/DWM-Control-*-Linux.deb \
            dist/latest-linux.yml \
            --repo "${{ github.repository }}" \
            --clobber
