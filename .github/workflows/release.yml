name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (for manual runs), e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

jobs:
  publish-mac:
    name: Publish macOS
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Import signing certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          if [ -z "${MAC_CERT_P12:-}" ] || [ -z "${MAC_CERT_PASSWORD:-}" ]; then
            echo "MAC_CERT_P12 or MAC_CERT_PASSWORD secret is missing" >&2
            exit 1
          fi

          CERT_PATH="${RUNNER_TEMP}/mac-signing-cert.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          # Clean up any leftover keychain from a previous failed run
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

          echo "$MAC_CERT_P12" | base64 --decode > "$CERT_PATH"
          if [ ! -s "$CERT_PATH" ]; then
            echo "Decoded MAC_CERT_P12 is empty or invalid base64" >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import private key + cert; -T grants codesign access at import time
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security -f pkcs12

          # Grant codesign non-interactive access to the private key (required on macOS 12+)
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Download Apple CA certs needed to build the trust chain for Developer ID G2 certs.
          # Two separate operations are required:
          #   1. security import  → puts the cert in the keychain so codesign can find it
          #      when walking the chain from leaf → intermediate → root.
          #   2. security add-trusted-cert → marks it as trusted in the USER trust domain
          #      (no -d = user domain, no admin required; codesign checks user trust settings).
          # Both are needed. import alone = cert is findable but untrusted.
          # add-trusted-cert alone = trusted setting recorded but cert may not be in keychain.
          curl -sSfL "https://www.apple.com/certificateauthority/DeveloperIDCA.cer" \
            -o "${RUNNER_TEMP}/DeveloperIDCA.cer"
          curl -sSfL "https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer" \
            -o "${RUNNER_TEMP}/DeveloperIDG2CA.cer"

          # Also fetch Apple Root CA G2 — the self-signed root that Developer ID G2 chains to.
          # On a fresh runner user account this may not yet be in any accessible trust store.
          curl -sSfL "https://www.apple.com/appleca/AppleRootCA-G2.cer" \
            -o "${RUNNER_TEMP}/AppleRootCAG2.cer" || true

          for CACERT in DeveloperIDCA.cer DeveloperIDG2CA.cer AppleRootCAG2.cer; do
            CAPATH="${RUNNER_TEMP}/${CACERT}"
            [ -s "$CAPATH" ] || continue
            # Import into build keychain (chain building)
            security import "$CAPATH" -k "$KEYCHAIN_PATH" 2>/dev/null || true
            # Mark as trusted in user domain (trust evaluation)
            security add-trusted-cert -r trustAsRoot \
              -k "$HOME/Library/Keychains/login.keychain-db" "$CAPATH" 2>/dev/null || true
          done

          # Prepend build keychain to the existing search list (preserves System.keychain etc.)
          security default-keychain -s "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | xargs)

          echo "=== Certs in build keychain after setup ==="
          security find-certificate -a "$KEYCHAIN_PATH" | grep "labl" || true

          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"
          rm -f "$CERT_PATH"

      - name: Verify codesign works with build keychain
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          echo "=== Keychain search list ==="
          security list-keychains -d user
          echo "=== Identities in build keychain ==="
          security find-identity -v "$SIGNING_KEYCHAIN"
          echo "=== All certs in build keychain ==="
          security find-certificate -a "$SIGNING_KEYCHAIN" | grep "labl" || true
          echo "=== Direct codesign test ==="
          cp /bin/ls "${RUNNER_TEMP}/test-sign-bin"
          codesign --sign "8263089E2FDBBF70732F3561BB71D82323ADCFE5" \
            --keychain "$SIGNING_KEYCHAIN" \
            --force \
            --timestamp \
            --options runtime \
            "${RUNNER_TEMP}/test-sign-bin"
          echo "Codesign test: PASSED"

      - name: Build macOS artifacts
        env:
          DEBUG: "electron-builder"
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          rm -rf "$MAC_OUT_DIR" || true
          COPYFILE_DISABLE=1 npx electron-builder --mac --publish=never --config.directories.output="$MAC_OUT_DIR"

      - name: Remove build keychain
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/build.keychain-db" 2>/dev/null || true

      - name: Verify macOS app signature
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          APP_PATH="$(find "$MAC_OUT_DIR" -type d -name "DWM Control.app" | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $MAC_OUT_DIR" >&2
            find "$MAC_OUT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"

      - name: Ensure gh CLI is available
        run: brew install gh || true

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload macOS assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          gh release upload "$RELEASE_TAG" \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-Intel.dmg \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-AppleSilicon.zip \
            "$MAC_OUT_DIR"/latest-mac*.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-windows:
    name: Publish Windows
    runs-on: [self-hosted, Linux]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Prepare Wine runtime directory
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"

      - name: Build Windows artifacts
        env:
          WINE: wine64
          NSIS_USE_SYSTEM_NSIS: "true"
          XDG_RUNTIME_DIR: ${{ runner.temp }}/xdg-runtime
          DISPLAY: ":99"
          WINEARCH: win64
          WINEPREFIX: ${{ runner.temp }}/wine64
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          WINE_BIN="$(command -v wine64 || command -v wine || true)"
          if [ -z "$WINE_BIN" ]; then
            echo "Neither wine64 nor wine is installed on this runner" >&2
            exit 127
          fi
          ln -sf "$WINE_BIN" "$RUNNER_TEMP/bin/wine"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          Xvfb :99 -screen 0 1024x768x16 >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          trap 'kill "$XVFB_PID" >/dev/null 2>&1 || true' EXIT
          wine --version
          wineboot -u
          npm run build:win

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Windows assets to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Windows-Setup.exe \
            dist/latest.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-linux:
    name: Publish Linux
    runs-on: [self-hosted, Linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Linux assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Linux.AppImage \
            dist/DWM-Control-*-Linux.deb \
            dist/latest-linux.yml \
            --repo "${{ github.repository }}" \
            --clobber
