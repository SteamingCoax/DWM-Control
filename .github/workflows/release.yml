name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: v1.1.1

jobs:
  publish-mac:
    name: Publish macOS
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS artifacts
        env:
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npm run build:mac

      - name: Ensure gh CLI is available
        run: brew install gh || true

      - name: Upload macOS assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.dmg \
            dist/*mac*.zip \
            dist/latest-mac*.yml \
            dist/*.blockmap \
            --repo "${{ github.repository }}" \
            --clobber

  publish-windows:
    name: Publish Windows
    runs-on: [self-hosted, Linux]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Prepare Wine runtime directory
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"

      - name: Build Windows artifacts
        env:
          WINE: wine64
          NSIS_USE_SYSTEM_NSIS: "true"
          XDG_RUNTIME_DIR: ${{ runner.temp }}/xdg-runtime
          DISPLAY: ":99"
          WINEARCH: win64
          WINEPREFIX: ${{ runner.temp }}/wine64
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          cat > "$RUNNER_TEMP/bin/wine" <<'EOF'
          #!/usr/bin/env bash
          if command -v wine64 >/dev/null 2>&1; then
            exec wine64 "$@"
          elif command -v wine >/dev/null 2>&1; then
            exec wine "$@"
          else
            echo "Neither wine64 nor wine is installed on this runner" >&2
            exit 127
          fi
          EOF
          chmod +x "$RUNNER_TEMP/bin/wine"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          Xvfb :99 -screen 0 1024x768x16 >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          trap 'kill "$XVFB_PID" >/dev/null 2>&1 || true' EXIT
          wine --version
          wineboot -u
          npm run build:win

      - name: Upload Windows assets to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*Setup*.exe \
            dist/*Portable*.exe \
            dist/latest.yml \
            dist/*.blockmap \
            --repo "${{ github.repository }}" \
            --clobber

  publish-linux:
    name: Publish Linux
    runs-on: [self-hosted, Linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Upload Linux assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.AppImage \
            dist/*.deb \
            dist/latest-linux.yml \
            --repo "${{ github.repository }}" \
            --clobber
