name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  RELEASE_TAG: v1.1.1

jobs:
  publish-mac:
    name: Publish macOS
    runs-on: macos-13
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build macOS artifacts
        run: npm run build:mac

      - name: Upload macOS assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.dmg \
            dist/*mac*.zip \
            dist/latest-mac.yml \
            dist/*.blockmap \
            --repo "${{ github.repository }}" \
            --clobber

  publish-windows:
    name: Publish Windows
    runs-on: windows-2022
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Windows artifacts
        run: npm run build:win

      - name: Upload Windows assets to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*Setup*.exe \
            dist/*Portable*.exe \
            dist/latest.yml \
            dist/*.blockmap \
            --repo "${{ github.repository }}" \
            --clobber

  publish-linux:
    name: Publish Linux
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Upload Linux assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/*.AppImage \
            dist/*.deb \
            dist/latest-linux.yml \
            --repo "${{ github.repository }}" \
            --clobber
