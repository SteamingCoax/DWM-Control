name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to publish (for manual runs), e.g. v1.2.3"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}

jobs:
  publish-mac:
    name: Publish macOS
    runs-on: [self-hosted, macOS]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Import macOS signing certificate
        env:
          MAC_CERT_P12: ${{ secrets.MAC_CERT_P12 }}
          MAC_CERT_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${MAC_CERT_P12:-}" ] || [ -z "${MAC_CERT_PASSWORD:-}" ]; then
            echo "::error::MAC_CERT_P12 or MAC_CERT_PASSWORD secret is not set" >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/mac-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="ci-temporary-keychain-password"

          echo "$MAC_CERT_P12" | base64 --decode > "$CERT_PATH"

          # Validate the decoded P12 has content
          if [ ! -s "$CERT_PATH" ]; then
            echo "::error::Decoded P12 file is empty — MAC_CERT_P12 secret may not be valid base64" >&2
            exit 1
          fi

          # Delete stale keychain from previous runs (self-hosted runner reuse)
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Prepend our keychain to the search list while preserving existing ones
          EXISTING_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | tr -s ' ' '\n' | xargs)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $EXISTING_KEYCHAINS

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "Available signing identities:"
          IDENTITY_COUNT=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c 'valid identities found' || true)
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          VALID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -E '^[[:space:]]+[0-9]+\)' | wc -l | tr -d ' ')
          if [ "$VALID" -eq 0 ]; then
            echo "::error::No valid codesigning identities found after import. Check MAC_CERT_P12 and MAC_CERT_PASSWORD." >&2
            exit 1
          fi
          echo "Found $VALID signing identity/identities."

      - name: Build macOS artifacts
        env:
          # Pass base64 cert directly — electron-builder accepts this for CSC_LINK
          # and avoids any temp file path resolution issues
          CSC_LINK: ${{ secrets.MAC_CERT_P12 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          rm -rf "$MAC_OUT_DIR" || true
          COPYFILE_DISABLE=1 npx electron-builder --mac --publish=never --config.directories.output="$MAC_OUT_DIR"

      - name: Verify macOS app signature
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          APP_PATH="$(find "$MAC_OUT_DIR" -type d -name "DWM Control.app" | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle found in $MAC_OUT_DIR" >&2
            find "$MAC_OUT_DIR" -maxdepth 3 -print || true
            exit 1
          fi

          echo "Verifying signature: $APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          codesign -dv --verbose=4 "$APP_PATH"

      - name: Ensure gh CLI is available
        run: brew install gh || true

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload macOS assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          MAC_OUT_DIR="${RUNNER_TEMP}/dwm-dist"
          gh release upload "$RELEASE_TAG" \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-Intel.dmg \
            "$MAC_OUT_DIR"/DWM-Control-*-macOS-AppleSilicon.zip \
            "$MAC_OUT_DIR"/latest-mac*.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-windows:
    name: Publish Windows
    runs-on: [self-hosted, Linux]
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Prepare Wine runtime directory
        run: |
          mkdir -p "$RUNNER_TEMP/xdg-runtime"
          chmod 700 "$RUNNER_TEMP/xdg-runtime"

      - name: Build Windows artifacts
        env:
          WINE: wine64
          NSIS_USE_SYSTEM_NSIS: "true"
          XDG_RUNTIME_DIR: ${{ runner.temp }}/xdg-runtime
          DISPLAY: ":99"
          WINEARCH: win64
          WINEPREFIX: ${{ runner.temp }}/wine64
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          WINE_BIN="$(command -v wine64 || command -v wine || true)"
          if [ -z "$WINE_BIN" ]; then
            echo "Neither wine64 nor wine is installed on this runner" >&2
            exit 127
          fi
          ln -sf "$WINE_BIN" "$RUNNER_TEMP/bin/wine"
          export PATH="$RUNNER_TEMP/bin:$PATH"
          Xvfb :99 -screen 0 1024x768x16 >/tmp/xvfb.log 2>&1 &
          XVFB_PID=$!
          trap 'kill "$XVFB_PID" >/dev/null 2>&1 || true' EXIT
          wine --version
          wineboot -u
          npm run build:win

      - name: Ensure release exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Windows assets to existing release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Windows-Setup.exe \
            dist/latest.yml \
            --repo "${{ github.repository }}" \
            --clobber

  publish-linux:
    name: Publish Linux
    runs-on: [self-hosted, Linux]
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: SKIP_ELECTRON_BUILDER_INSTALL_APP_DEPS=1 npm install

      - name: Build Linux artifacts
        run: npm run build:linux

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" \
              --repo "${{ github.repository }}" \
              --title "DWM Control $RELEASE_TAG" \
              --notes "Automated release for $RELEASE_TAG"
          fi

      - name: Upload Linux assets to existing release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" \
            dist/DWM-Control-*-Linux.AppImage \
            dist/DWM-Control-*-Linux.deb \
            dist/latest-linux.yml \
            --repo "${{ github.repository }}" \
            --clobber
